blueprint:
  name: Paralelo Virtual - mcamtech (revisado)
  description: Sincroniza switches/lights de um grupo, evitando loops
  domain: automation
  input:
    entrada_switchs:
      name: Escolha os pontos de Iluminação
      selector:
        entity:
          domain:
            - switch
            - light
          multiple: true

trigger:
  - platform: state
    entity_id: !input entrada_switchs
    to:
      - "on"
      - "off"

variables:
  entidades: !input entrada_switchs

condition:
  - condition: template
    value_template: >
      {% set alvo = trigger.to_state.state %}
      {{ expand(entidades) | rejectattr('state', 'eq', alvo) | list | count > 0 }}

action:
  - service: "homeassistant.turn_{{ trigger.to_state.state }}"
    target:
      entity_id: !input entrada_switchs
  - delay:
      seconds: 2

mode: restart
